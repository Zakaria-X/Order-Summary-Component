<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Red+Hat+Display:wght@500;700;900&display=swap"
    rel="stylesheet"
  >
  <link rel="stylesheet" href="master.css">
  <title>Frontend Mentor | Order summary card</title>
</head>

<body>
  <main class="order-card" aria-label="Order summary card">
    <img
      src="./images/illustration-hero.svg"
      alt="A person enjoying music while dancing"
      class="hero-image"
    >

    <div class="card-content">
      <h1>Order Summary</h1>
      <p>
        You can now listen to millions of songs, audiobooks, and podcasts on any
        device anywhere you like!
      </p>

      <section class="plan-box" aria-label="Selected plan">
        <img src="./images/icon-music.svg" alt="" aria-hidden="true">
        <div class="plan-details">
          <h2>Annual Plan</h2>
          <p>$59.99/year</p>
        </div>
        <a href="#" class="change-link">Change</a>
      </section>

      <button type="button" class="payment-btn">Proceed to Payment</button>
      <a href="#" class="cancel-link">Cancel Order</a>
    </div>
  </main>

  <div class="attribution">
    Challenge by <a href="https://www.frontendmentor.io?ref=challenge" target="_blank">Frontend Mentor</a>.
    Coded by <a href="#">Zakaria</a>.
  </div>
</body>

</html>
